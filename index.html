<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRINCESS — Love Archetype Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdf8f3; --bg2:#f5f0eb; --accent:#e4a4bd; --ink:#262626;
    --ease:cubic-bezier(0.16,1,0.3,1);
    --line:rgba(38,38,38,.12);
    --font:'League Spartan','Noto Sans KR',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;overflow-x:hidden}
  ::selection{background:var(--accent);color:var(--ink)}
  h1,h2,h3,h4,.q-text,.res-name{word-break:keep-all}

  .util{font-size:10px;font-weight:900;letter-spacing:.4em;text-transform:uppercase}
  .accent{color:var(--accent)}
  .ital{font-style:italic;color:var(--accent);font-weight:500}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;height:72px;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:0 clamp(20px,5vw,56px);background:rgba(253,248,243,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(38,38,38,.05)}
  .brand{font-weight:900;font-size:18px;letter-spacing:.04em;text-transform:uppercase}
  .brand b{color:var(--accent)}
  .nav-mid{font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:rgba(38,38,38,.5)}
  @media(max-width:640px){.nav-mid{display:none}}
  .nav-cta{font-family:var(--font);cursor:pointer;border:none;background:var(--accent);color:var(--ink);font-weight:900;font-size:11px;
    letter-spacing:.15em;text-transform:uppercase;padding:12px 28px;border-radius:999px;transition:all .5s var(--ease)}
  .nav-cta:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(228,164,189,.5)}

  main{max-width:1120px;margin:0 auto;padding:72px clamp(20px,5vw,56px) 0}
  section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:60px 0}

  .reveal{opacity:0;transform:translateY(40px);transition:all 1s var(--ease)}
  .reveal.in{opacity:1;transform:none}

  /* PORTRAIT (grayscale → color) */
  .portrait{filter:grayscale(100%);transition:filter 1s var(--ease),transform 1s var(--ease)}
  .portrait svg{display:block;width:100%;height:100%}
  .portrait.lit{filter:grayscale(0)}

  /* HERO */
  .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center}
  @media(max-width:860px){.hero{grid-template-columns:1fr;gap:36px}}
  .hero-eyebrow{margin-bottom:26px;color:rgba(38,38,38,.55)}
  h1.head{font-weight:900;font-size:clamp(48px,9.5vw,120px);line-height:.86;letter-spacing:-.03em;text-transform:uppercase}
  .hero p.body{margin:30px 0 6px;max-width:430px;font-size:16.5px;line-height:1.75;color:rgba(38,38,38,.72);font-weight:400}
  .arrow-cta{display:inline-flex;align-items:center;gap:10px;margin-top:26px;cursor:pointer;background:none;border:none;
    font-family:var(--font);font-weight:900;font-size:14px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);
    padding-bottom:6px;border-bottom:2px solid var(--accent);transition:gap .5s var(--ease)}
  .arrow-cta:hover{gap:18px}
  .hero-card{position:relative;background:var(--bg2);border-radius:24px;aspect-ratio:4/5;padding:7%;
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  #heroFan{display:flex;flex-wrap:wrap;gap:11px;justify-content:center;align-items:center;width:100%}
  .hp{width:30%;aspect-ratio:1/1;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .hp .portrait{width:90%;height:90%}
  .hp:hover .portrait{filter:grayscale(0);transform:scale(1.06)}
  .badge{position:absolute;width:140px;height:140px;border-radius:50%;background:var(--accent);color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;bottom:-26px;left:-26px;
    box-shadow:0 18px 40px rgba(228,164,189,.45);animation:bounce-slow 4s ease-in-out infinite}
  .badge .n{font-size:32px;font-weight:900;font-style:italic;line-height:1}
  .badge .t{font-size:8px;font-weight:900;letter-spacing:.25em;text-transform:uppercase;margin-top:4px}
  @keyframes bounce-slow{0%,100%{transform:translateY(-5%)}50%{transform:translateY(5%)}}

  /* QUIZ */
  #quiz section{justify-content:center}
  .q-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px}
  .q-count{font-size:10px;font-weight:900;letter-spacing:.3em;color:rgba(38,38,38,.45)}
  .q-bartrack{height:2px;background:var(--line);margin-bottom:54px;position:relative}
  .q-bar{position:absolute;inset:0 auto 0 0;height:2px;width:0;background:var(--accent);transition:width 1s var(--ease)}
  .q-text{font-weight:800;font-size:clamp(26px,4.2vw,46px);line-height:1.08;letter-spacing:-.02em;max-width:18ch;margin-bottom:46px}
  .opt{width:100%;cursor:pointer;background:none;border:none;border-top:1px solid var(--line);font-family:var(--font);text-align:left;color:var(--ink);
    display:grid;grid-template-columns:54px 1fr 30px;align-items:center;gap:16px;padding:25px 14px;transition:all .6s var(--ease)}
  .opts .opt:last-child{border-bottom:1px solid var(--line)}
  .opt .onum{font-size:11px;font-weight:900;letter-spacing:.2em;color:var(--accent);transition:color .6s var(--ease)}
  .opt .otext{font-size:clamp(16px,2vw,20px);font-weight:500;line-height:1.4}
  .opt .oarr{font-size:18px;opacity:0;transform:translateX(-8px);transition:all .6s var(--ease);justify-self:end}
  .opt:hover{background:var(--accent);padding-left:28px;padding-right:24px}
  .opt:hover .onum{color:var(--ink)}
  .opt:hover .oarr{opacity:1;transform:none}

  /* RESULT */
  #result{display:none}
  #result.show{display:block}
  .res-eyebrow{color:rgba(38,38,38,.5);margin-bottom:22px}
  .res-top{display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center;margin-bottom:8px}
  @media(max-width:860px){.res-top{grid-template-columns:1fr;gap:24px}}
  .res-name{font-weight:900;font-size:clamp(52px,10vw,112px);line-height:.84;letter-spacing:-.03em;text-transform:uppercase}
  .res-name .ko{display:block;font-size:clamp(28px,5vw,56px);margin-top:8px}
  .res-tag{margin-top:22px;font-size:18px;font-weight:500;color:rgba(38,38,38,.7);max-width:34ch}
  .res-card{position:relative;background:var(--bg2);border-radius:24px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:7%}
  .res-card .portrait{width:82%;height:82%}
  .res-card:hover .portrait{filter:grayscale(0);transform:scale(1.05)}

  .sync{margin:44px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:26px 0}
  .sync-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .sync-top .lab{font-size:10px;font-weight:900;letter-spacing:.3em;text-transform:uppercase;color:rgba(38,38,38,.55)}
  .sync-top .pct{font-size:clamp(40px,7vw,72px);font-weight:900;font-style:italic;line-height:.8;letter-spacing:-.03em}
  .sync-track{height:6px;background:var(--line);position:relative;border-radius:3px;overflow:hidden}
  .sync-bar{position:absolute;inset:0 auto 0 0;height:6px;width:0;background:var(--accent);transition:width 1.2s var(--ease)}

  .quote{font-size:clamp(20px,3.2vw,30px);font-weight:500;font-style:italic;line-height:1.4;letter-spacing:-.01em;max-width:26ch;margin:6px 0 44px}
  .quote::before{content:"“";color:var(--accent)} .quote::after{content:"”";color:var(--accent)}

  .tags{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:48px}
  .tag{font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--ink);padding:8px 16px;border-radius:999px}

  .block{margin-bottom:48px}
  .block .klab{color:var(--accent);margin-bottom:14px;display:block}
  .block h3{font-weight:900;font-size:clamp(24px,4.4vw,40px);line-height:1;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:18px}
  .block p{font-size:16.5px;line-height:1.8;color:rgba(38,38,38,.8);max-width:62ch;font-weight:400}

  /* mirror self-reflection */
  .mirror{background:var(--ink);color:var(--bg);border-radius:22px;padding:38px clamp(26px,4vw,44px);margin-bottom:48px;position:relative;overflow:hidden}
  .mirror .klab{color:var(--accent);display:block;margin-bottom:16px}
  .mirror p{font-size:clamp(18px,2.6vw,23px);line-height:1.6;font-weight:500;max-width:44ch}
  .mirror .big{position:absolute;right:-10px;top:-30px;font-size:160px;opacity:.06;font-weight:900;font-style:italic}

  .duo{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:48px}
  .duo .cell{background:var(--bg);padding:34px 30px}
  .duo .cell .klab{display:block;margin-bottom:12px}
  .duo .cell h4{font-weight:900;font-size:20px;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:12px}
  .duo .cell p{font-size:15.5px;line-height:1.75;color:rgba(38,38,38,.8);font-weight:400}
  .duo .good .klab{color:var(--accent)}
  @media(max-width:640px){.duo{grid-template-columns:1fr}}

  .tip{background:var(--bg2);border-radius:18px;padding:32px 34px;margin-bottom:48px}
  .tip .klab{color:var(--accent);display:block;margin-bottom:12px}
  .tip p{font-size:17px;font-weight:500;line-height:1.65}

  .kemi{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:48px}
  @media(max-width:640px){.kemi{grid-template-columns:1fr}}
  .kcard{border:1px solid var(--line);border-radius:20px;padding:28px;transition:all .8s var(--ease)}
  .kcard:hover{background:var(--bg2)}
  .kcard .khead{font-size:10px;font-weight:900;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
  .kcard .kbody{display:flex;align-items:center;gap:16px;margin-bottom:16px}
  .kmini{width:64px;height:64px;flex:0 0 auto;background:var(--bg2);border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .kcard:hover .kmini{background:#fff}
  .kmini .portrait{width:92%;height:92%}
  .kcard:hover .portrait{filter:grayscale(0);transform:scale(1.05)}
  .kcard .kname{font-weight:900;font-size:28px;text-transform:uppercase;letter-spacing:-.02em;line-height:.9}
  .kcard .kname span{display:block;font-size:14px;color:rgba(38,38,38,.55);margin-top:4px}
