<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 연애 스타일 공주 테스트 ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Gowun+Batang:wght@400;700&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#e8c66b; --gold2:#f7e6a8; --deep:#1b1340; --deep2:#2a1f63;
    --rose:#ffb6d5; --lav:#c9b6ff; --sky:#9fd2ff; --cream:#fff7e9;
    --ink:#2a2150;
    --serif:'Gowun Batang',serif;
    --deco:'Cinzel Decorative','Gowun Batang',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--serif);color:var(--cream);
    background:
      radial-gradient(1200px 600px at 50% -10%, #4a2f8f 0%, transparent 55%),
      radial-gradient(800px 500px at 10% 100%, #5a2f6e 0%, transparent 60%),
      radial-gradient(800px 500px at 100% 80%, #2b3b8f 0%, transparent 60%),
      linear-gradient(180deg,#1b1340 0%,#241852 60%,#1a1136 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:26px 16px;overflow-x:hidden;position:relative;
  }
  /* twinkling stars */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;color:var(--gold2);opacity:.0;animation:tw 3.6s infinite ease-in-out}
  @keyframes tw{0%,100%{opacity:.1;transform:scale(.7)}50%{opacity:.95;transform:scale(1.15)}}

  .stage{position:relative;z-index:2;width:100%;max-width:640px}
  .card{
    background:linear-gradient(180deg, rgba(255,247,233,.97), rgba(255,243,224,.97));
    color:var(--ink);border-radius:26px;padding:40px 34px;
    border:2px solid var(--gold);
    box-shadow:0 0 0 6px rgba(232,198,107,.16), 0 30px 70px rgba(10,6,40,.55);
    position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:10px;border:1px solid rgba(232,198,107,.45);border-radius:18px;pointer-events:none}
  .crown{font-size:46px;text-align:center;filter:drop-shadow(0 4px 10px rgba(232,198,107,.5))}
  h1{font-family:var(--deco);font-size:clamp(25px,5.6vw,36px);text-align:center;line-height:1.25;
     color:#5a3d12;margin:10px 0 6px;letter-spacing:.5px}
  .ttl-sub{text-align:center;color:#8a6f3a;font-size:15px;margin-bottom:24px}
  .lead{text-align:center;font-size:16px;line-height:1.85;color:#4a3c22;margin:6px 4px 28px}
  .deco-line{display:flex;align-items:center;gap:12px;justify-content:center;color:var(--gold);margin:18px 0;font-size:13px}
  .deco-line::before,.deco-line::after{content:"";height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold))}
  .deco-line::after{background:linear-gradient(90deg,var(--gold),transparent)}

  .btn{
    display:block;width:100%;cursor:pointer;border:none;
    font-family:var(--deco);font-weight:700;font-size:18px;letter-spacing:.5px;
    color:#3a2708;padding:17px 20px;border-radius:16px;
    background:linear-gradient(180deg,var(--gold2),var(--gold));
    box-shadow:0 8px 20px rgba(232,198,107,.45), inset 0 1px 0 rgba(255,255,255,.7);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(232,198,107,.6)}
  .btn:active{transform:translateY(0)}

  /* progress */
  .prog-wrap{margin-bottom:22px}
  .prog-top{display:flex;justify-content:space-between;font-size:13px;color:#8a6f3a;margin-bottom:8px}
  .prog{height:10px;border-radius:8px;background:rgba(120,90,40,.16);overflow:hidden}
  .prog .bar{height:100%;width:0;border-radius:8px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--lav));transition:width .5s cubic-bezier(.2,.8,.2,1)}

  .q-num{font-family:var(--deco);color:#b08a3a;font-size:14px;text-align:center}
  .q-text{font-size:21px;line-height:1.5;text-align:center;color:#3f3119;margin:8px 6px 26px;font-weight:700}

  .opts{display:flex;flex-direction:column;gap:13px}
  .opt{
    cursor:pointer;text-align:left;font-family:var(--serif);font-size:16.5px;line-height:1.5;color:#43361c;
    background:rgba(255,255,255,.7);border:1.5px solid rgba(176,138,58,.4);
    padding:16px 18px;border-radius:14px;display:flex;gap:13px;align-items:flex-start;
    transition:all .18s ease;
  }
  .opt:hover{background:#fff;border-color:var(--gold);transform:translateX(4px);box-shadow:0 6px 16px rgba(176,138,58,.2)}
  .opt .mk{font-size:19px;line-height:1.4}

  .fade{animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* result */
  .res-emoji{font-size:74px;text-align:center;animation:pop .7s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1);opacity:1}}
  .res-label{text-align:center;color:#a07b2e;letter-spacing:3px;font-size:13px;margin-top:8px}
  .res-name{font-family:var(--deco);font-size:clamp(28px,7vw,42px);text-align:center;margin:4px 0 2px}
  .res-tag{text-align:center;font-size:17px;color:#6b5326;font-weight:700;margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 22px}
  .chip{font-size:13px;background:rgba(232,198,107,.22);border:1px solid var(--gold);color:#6b5020;padding:5px 13px;border-radius:999px}
  .res-box{background:rgba(255,255,255,.6);border:1px solid rgba(176,138,58,.35);border-radius:16px;padding:18px 20px;margin-bottom:16px}
  .res-box h3{font-family:var(--deco);font-size:16px;color:#7a5a18;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .res-box p{font-size:15.5px;line-height:1.8;color:#43361c}
  .kemi{text-align:center;font-size:14.5px;color:#6b5326;margin:6px 0 20px}
  .kemi b{color:#a8418a}
  .row{display:flex;gap:12px}
  .row .btn{font-size:15px;padding:14px}
  .btn.ghost{background:transparent;border:1.5px solid var(--gold);color:#7a5a18;box-shadow:none}
  .btn.ghost:hover{background:rgba(232,198,107,.15)}
  .footnote{text-align:center;font-size:12px;color:#9a8048;margin-top:18px;line-height:1.6}
  .hidden{display:none}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="stage">
  <div class="card" id="card">

    <!-- INTRO -->
    <div id="intro" class="fade">
      <div class="crown">👑</div>
      <h1>나의 연애 스타일은<br>어떤 공주일까?</h1>
      <div class="ttl-sub">— Disney Princess Love Test —</div>
      <p class="lead">
        사랑에 빠지는 방식, 데이트, 다툼 그리고 연애의 의미까지.<br>
        다섯 가지 질문에 답하면, 당신의 연애 방식과 가장 닮은<br>
        <b>디즈니 공주</b>를 찾아드려요. ✨
      </p>
      <div class="deco-line">♔ 5문항 · 약 1분 ♔</div>
      <button class="btn" onclick="start()">테스트 시작하기</button>
    </div>

    <!-- QUIZ -->
    <div id="quiz" class="hidden">
      <div class="prog-wrap">
        <div class="prog-top"><span id="pLabel">Question 1</span><span id="pCount">1 / 5</span></div>
        <div class="prog"><div class="bar" id="pBar"></div></div>
      </div>
      <div id="qBody"></div>
    </div>

    <!-- RESULT -->
    <div id="result" class="hidden"></div>

  </div>
</div>

<script>
/* =========================================================
   공주 데이터 — 각자 '연애 방식' 아키타입
   ========================================================= */
const P = {
  cinderella:{
    emoji:"👠", label:"CINDERELLA", name:"신데렐라",
    color:"#9fd2ff",
    tag:"운명을 믿는 순정 로맨티스트",
    traits:["진심","인내심","낭만","한결같음"],
    why:"서두르지 않고 진짜 인연이 올 때를 기다릴 줄 아는 당신. 작은 약속도 소중히 지키고, 사랑 앞에서 진심과 예의를 잃지 않아요. 자정의 종이 울려도 유리구두를 남기는, 운명을 믿는 사람이에요.",
    desc:"화려한 무도회보다 '진짜 한 사람'을 기다리는 타입. 다만 너무 상대에게 맞추다 자신을 놓치지 않도록, 가끔은 먼저 손을 내밀어도 좋아요.",
    kemi:"라푼젤"
  },
  belle:{
    emoji:"📖", label:"BELLE", name:"벨",
    color:"#f4c87a",
    tag:"내면을 읽는 사려 깊은 탐구가",
    traits:["통찰","대화","독서","진정성"],
    why:"겉모습이나 분위기보다 '어떤 사람인지'를 먼저 보는 당신. 깊은 대화로 마음을 열고, 천천히 상대의 진짜 모습을 알아가요. 야수 속 왕자를 알아본 벨처럼 안목이 남다른 사람이에요.",
    desc:"빠른 설렘보다 함께 성장하는 관계를 원하는 타입. 호기심과 배움을 나눌 수 있는 사람과 가장 잘 맞아요.",
    kemi:"자스민"
  },
  moana:{
    emoji:"🌊", label:"MOANA", name:"모아나",
    color:"#67d3c4",
    tag:"나의 항해가 먼저인 독립가",
    traits:["주체성","목표","독립","모험"],
    why:"연애가 인생의 전부는 아니라고 믿는 당신. 내 꿈과 길을 분명히 알고, 누가 정해주지 않아도 스스로 항해해요. 그래서 연애도 서로를 구속하지 않는 동등한 관계를 추구해요.",
    desc:"함께여도 각자의 바다를 응원해 주는 사람과 최고의 케미. 혼자여도 충분히 빛나기에, 곁의 사람도 같이 빛나게 만들어요.",
    kemi:"모아나처럼 자기 길이 뚜렷한 사람"
  },
  rapunzel:{
    emoji:"🎨", label:"RAPUNZEL", name:"라푼젤",
    color:"#d3b6ff",
    tag:"매일이 모험인 열정 가득형",
    traits:["호기심","표현력","에너지","순수함"],
    why:"마음이 가면 숨기지 않고 표현하는 당신. 함께라면 평범한 하루도 모험이 되고, 새로운 경험에 늘 두근거려요. 탑을 박차고 나온 라푼젤처럼 세상을 향한 설렘이 가득한 사람이에요.",
    desc:"같이 새로운 걸 시도하고 감정을 솔직히 나누는 관계에서 행복해요. 다만 설렘만큼 상대의 속도도 살펴주면 더 단단해져요.",
    kemi:"신데렐라"
  },
  jasmine:{
    emoji:"🪄", label:"JASMINE", name:"자스민",
    color:"#b69cff",
    tag:"당당하고 솔직한 자유로운 영혼",
    traits:["솔직함","당당함","평등","자유"],
    why:"\"나는 누가 정해주는 사람이 아니야.\" 자신의 마음에 솔직하고, 관계에서 동등함과 자유를 중요하게 여기는 당신. 화려한 조건보다 진짜 마음과 존중을 보는 멋진 사람이에요.",
    desc:"숨기거나 눈치 보는 연애는 답답한 타입. 서로를 있는 그대로 인정하고 솔직하게 대화하는 사람과 잘 맞아요.",
    kemi:"벨"
  }
};

/* =========================================================
   질문 — 각 질문은 공주 5명 중 1명을 '쉬어가게' 설계해
   모든 결과가 공평하게 나올 수 있도록 점수를 배분했다.
   score: 해당 선택 시 각 공주에게 더해지는 점수(주 +2, 보조 +1)
   ========================================================= */
const Q = [
  { q:"새로운 사람에게 마음이 갈 때, 나는…",
    opts:[
      {t:"운명일지도 모른다는 설렘에 마음이 부푼다", s:{cinderella:2, rapunzel:1}},
      {t:"어떤 사람인지 천천히, 깊이 알아가고 싶다", s:{belle:2}},
      {t:"내 일상에 집중하며 자연스럽게 흘러가게 둔다", s:{moana:2}},
      {t:"좋아하는 마음을 숨기지 않고 먼저 표현한다", s:{rapunzel:2, jasmine:1}},
    ]},
  { q:"상상만 해도 설레는 '이상적인 데이트'는?",
    opts:[
      {t:"드레스코드가 있는 근사하고 로맨틱한 저녁", s:{cinderella:2}},
      {t:"서점·전시회에서 도란도란 깊은 대화", s:{belle:2}},
      {t:"계획 없이 떠나는 바다·자연 속 여행", s:{moana:2, rapunzel:1}},
      {t:"익숙한 틀을 벗어난 색다르고 짜릿한 모험", s:{jasmine:2, rapunzel:1}},
    ]},
  { q:"상대에게서 가장 크게 끌리는 매력은?",
    opts:[
      {t:"말이 잘 통하는 지적인 대화", s:{belle:2}},
      {t:"자기 세계가 뚜렷한 독립심", s:{moana:2, jasmine:1}},
      {t:"함께 있으면 매일이 즐거운 에너지", s:{rapunzel:2}},
      {t:"꾸밈없이 솔직하고 당당한 태도", s:{jasmine:2}},
    ]},
  { q:"연인과 갈등이 생겼을 때 나는…",
    opts:[
      {t:"마음이 풀릴 때까지 기다리고 배려한다", s:{cinderella:2}},
      {t:"차분히 대화로 오해의 원인을 짚는다", s:{belle:2}},
      {t:"감정을 솔직히 드러내고 금방 화해한다", s:{rapunzel:2}},
      {t:"할 말은 분명히, 서로 동등하게 풀어간다", s:{jasmine:2, moana:1}},
    ]},
  { q:"나에게 '연애'란 한마디로?",
    opts:[
      {t:"인생을 완성해 주는 운명 같은 것", s:{cinderella:2, rapunzel:1}},
      {t:"삶의 한 부분일 뿐, 나 자신이 먼저", s:{moana:2}},
      {t:"함께 떠나는 신나는 모험", s:{rapunzel:2}},
      {t:"자유롭게 나를 표현하는 무대", s:{jasmine:2, belle:1}},
    ]},
];

/* 동점 시 우선순위(밸런스용 고정 순서) */
const ORDER = ["cinderella","belle","moana","rapunzel","jasmine"];

let idx=0, scores={};
const $=id=>document.getElementById(id);

function start(){
  idx=0; scores={cinderella:0,belle:0,moana:0,rapunzel:0,jasmine:0};
  $("intro").classList.add("hidden");
  $("result").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  render();
}

function render(){
  const item=Q[idx];
  $("pLabel").textContent="Question "+(idx+1);
  $("pCount").textContent=(idx+1)+" / "+Q.length;
  $("pBar").style.width=((idx)/Q.length*100)+"%";
  let html='<div class="fade"><div class="q-num">✦ Q'+(idx+1)+' ✦</div>';
  html+='<div class="q-text">'+item.q+'</div><div class="opts">';
  item.opts.forEach((o,i)=>{
    html+='<button class="opt" onclick="choose('+i+')"><span class="mk">♡</span><span>'+o.t+'</span></button>';
  });
  html+='</div></div>';
  $("qBody").innerHTML=html;
}

function choose(i){
  const s=Q[idx].opts[i].s;
  for(const k in s) scores[k]+=s[k];
  idx++;
  if(idx<Q.length){ render(); }
  else { $("pBar").style.width="100%"; showResult(); }
}

function winner(){
  let best=ORDER[0];
  ORDER.forEach(k=>{ if(scores[k]>scores[best]) best=k; });
  return best;
}

function showResult(){
  const key=winner();
  const p=P[key];
  // 환상의 케미 표시(공주명이면 그 공주, 아니면 문구)
  const kemiName = P[p.kemi] ? P[p.kemi].name : p.kemi;
  $("quiz").classList.add("hidden");
  const r=$("result");
  r.style.setProperty("--accent",p.color);
  r.innerHTML=`
    <div class="fade">
      <div class="res-emoji">${p.emoji}</div>
      <div class="res-label">YOUR PRINCESS</div>
      <div class="res-name" style="color:#6b4e16">${p.name}</div>
      <div class="res-tag">"${p.tag}"</div>
      <div class="chips">${p.traits.map(t=>`<span class="chip">#${t}</span>`).join("")}</div>

      <div class="res-box">
        <h3>💛 왜 ${p.name}인가요?</h3>
        <p>${p.why}</p>
      </div>
      <div class="res-box">
        <h3>🔮 한 줄 연애 처방</h3>
        <p>${p.desc}</p>
      </div>
      <div class="kemi">✨ 환상의 케미 → <b>${kemiName}</b></div>

      <div class="row">
        <button class="btn ghost" onclick="copyResult('${p.name}','${p.tag}')">결과 공유 📋</button>
        <button class="btn" onclick="start()">다시 하기 ↺</button>
      </div>
      <div class="footnote">재미로 보는 심리테스트예요 · 만든이의 디즈니 사랑을 담아 💕</div>
    </div>`;
  r.classList.remove("hidden");
}

function copyResult(name,tag){
  const txt=`나의 연애 스타일 공주는 「${name}」 — "${tag}" ✨ 당신은 어떤 공주일까요?`;
  navigator.clipboard?.writeText(txt).then(
    ()=>alert("결과가 복사되었어요! 친구에게 붙여넣어 보세요 ✨\n\n"+txt),
    ()=>prompt("아래 내용을 복사하세요:",txt)
  );
}

/* 반짝이는 별 배경 */
(function(){
  const box=$("stars"); const N=46;
  for(let i=0;i<N;i++){
    const s=document.createElement("div");
    s.className="star";
    s.textContent = Math.random()>.5 ? "✦" : "✧";
    s.style.left=(Math.random()*100)+"%";
    s.style.top=(Math.random()*100)+"%";
    s.style.fontSize=(8+Math.random()*16)+"px";
    s.style.animationDelay=(Math.random()*3.6)+"s";
    box.appendChild(s);
  }
})();
</script>
</body>
</html>
